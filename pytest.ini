[pytest]
# Repo root on sys.path so tests can `import scheduler / validator / app`.
pythonpath = .
testpaths = tests/python
# Bare `pytest` runs only the fast suite; opt into the CP-SAT runs with
# `pytest -m slow` (the CLI -m overrides this default).
addopts = -q -m "not slow"
markers =
    slow: tests that run the real CP-SAT solver or a full /api/generate (seconds, not ms)
# Safety net so a wedged solve can't hang CI forever.
timeout = 120
